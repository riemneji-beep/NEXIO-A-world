<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<title>NEXIO-A-world | Search 🔎</title>

<style>

*{
box-sizing:border-box;
font-family:Arial;
}

body{
margin:0;
background:radial-gradient(circle,#4a148c,#090014);
color:white;
}

.container{
max-width:900px;
margin:auto;
padding:25px;
}

input{
width:100%;
padding:16px;
font-size:18px;
border:none;

}

.card{
background:rgba(255,255,255,.12);
padding:20px;
border-radius:20px;
margin-bottom:18px;
cursor:pointer;
transition:.25s;
}

.card:hover{
transform:scale(1.02);
}

.type{
color:#c084fc;
font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<h1>🔎 البحث في NEXIO-A-world</h1>

id="searchInput"

>

ابدأ بكتابة اسم...

</div>

</div>

</html>
